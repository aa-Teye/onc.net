<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overcomers Nation Church</title>
    <style>
      /* Hide Google Translate top bar & widget UI — keep translation engine active */
      .goog-te-banner-frame { display: none !important; }
      .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      .goog-text-highlight { background: none !important; box-shadow: none !important; }
      /* Container is invisible but the select inside is FUNCTIONAL */
      #google_translate_element {
        position: absolute;
        top: -999px;
        left: -999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Google Translate widget — hidden but functional -->
    <div id="google_translate_element"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,fr,es,pt,de,it,nl,ar,zh-CN,sw',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          },
          'google_translate_element'
        );
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </body>
</html>
